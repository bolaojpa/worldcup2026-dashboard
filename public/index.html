<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Copa do Mundo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo-container">
                <i class="fa-solid fa-trophy"></i>
                <h1>Copa do Mundo 2026</h1>
            </div>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="matches"><i class="fa-regular fa-calendar-days"></i> Jogos</button>
                <button class="tab-btn" data-tab="groups"><i class="fa-solid fa-list-ol"></i> Grupos</button>
                <button class="tab-btn" data-tab="classification"><i class="fa-solid fa-sitemap"></i> Classificação</button>
                <button class="tab-btn" data-tab="teams"><i class="fa-solid fa-flag"></i> Seleções</button>
                <button class="tab-btn" data-tab="stadiums"><i class="fa-solid fa-map-location-dot"></i> Estádios</button>
            </nav>
        </header>

        <main class="content-area">
            <div id="loading-spinner" class="spinner-container">
                <div class="spinner"></div>
                <p>Carregando dados ao vivo da API...</p>
            </div>

            <!-- Matches Tab -->
            <section id="matches-tab" class="tab-content active">
                <div class="filters-container">
                    <button class="filter-btn active" data-filter="today">Jogos de Hoje</button>
                    <button class="filter-btn" data-filter="live"><span class="pulse-dot"></span> Ao Vivo</button>
                    <button class="filter-btn" data-filter="all">Todos os Jogos</button>
                    <button class="filter-btn" data-filter="finished">Finalizados</button>
                    <button class="filter-btn" data-filter="group">Fase de Grupos</button>
                    <button class="filter-btn" data-filter="knockout">Mata-Mata</button>
                </div>
                <div class="list-container" id="matches-list"></div>
                <div class="pagination-container" id="pagination-area"></div>
            </section>

            <!-- Groups Tab -->
            <section id="groups-tab" class="tab-content">
                <div class="grid-container" id="groups-grid"></div>
            </section>

            <!-- Classification Tab -->
            <section id="classification-tab" class="tab-content">
                <div class="bracket-wrapper">
                    <div class="bracket-container" id="bracket-container"></div>
                </div>
            </section>

            <!-- Teams Tab -->
            <section id="teams-tab" class="tab-content">
                <div class="grid-container" id="teams-grid"></div>
            </section>

            <!-- Stadiums Tab -->
            <section id="stadiums-tab" class="tab-content">
                <div class="grid-container" id="stadiums-grid"></div>
            </section>
        </main>

        <!-- Match Details Modal -->
        <div id="match-details-modal" class="modal-overlay" style="display: none;">
            <div class="modal-card">
                <button class="modal-close-btn" id="close-modal-btn">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div id="modal-stage-title" class="modal-stage-title">Fase de Grupos</div>
                <div id="match-details-content"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
